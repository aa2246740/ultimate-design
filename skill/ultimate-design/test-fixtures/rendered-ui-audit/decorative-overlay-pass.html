<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rendered UI Audit Decorative Overlay Pass</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    main { width: min(620px, calc(100vw - 48px)); margin: 80px auto; padding: 40px; border: 1px solid #222; }
    .overlay { position: fixed; inset: 90px auto auto 50%; width: 280px; height: 120px; transform: translateX(-50%); background: rgba(255, 0, 0, .2); pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <main data-ud-check="readable-panel">
    <h1>Decorative overlay</h1>
    <p>The overlay has pointer-events none, so elementsFromPoint should still resolve to readable content.</p>
  </main>
  <div class="overlay" aria-hidden="true"></div>
</body>
</html>

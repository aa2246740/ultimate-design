<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    main { width: min(620px, calc(100vw - 48px)); margin: 80px auto; padding: 40px; border: 1px solid #222; }
    .cover { position: fixed; inset: 90px auto auto 50%; width: 280px; height: 120px; transform: translateX(-50%); background: rgba(0, 0, 0, .88); z-index: 10; }

<body>
  <main data-ud-check="covered-panel">
    <h1>Covered content</h1>

  </main>
  <div class="cover"></div>
</body>
